# yaml-language-server: $schema=../vendor/symfony/dependency-injection/Loader/schema/services.schema.json

parameters:
    images_directory: '%kernel.project_dir%/public/uploads/destinations'
    n8n_webhook_url: 'https://bechir19.app.n8n.cloud/webhook/smart-trip-itineraire'
    hotel_upload_dir: '%kernel.project_dir%/public/uploads/hotels'


services:
    _defaults:
        autowire: true
        autoconfigure: true

    App\:
        resource: '../src/'
        exclude:
            - '../src/DependencyInjection/'
            - '../src/Entity/'
            - '../src/Kernel.php'

    App\Service\HotelService:
        arguments:
            $uploadDir: '%hotel_upload_dir%'


    App\Service\MailService:
        arguments:
            $fromAddress: '%env(MAILER_FROM_ADDRESS)%'
            $fromName:    '%env(MAILER_FROM_NAME)%'

            
    App\Service\AiTransportService:
        arguments:
            $apiKey: '%env(ANTHROPIC_API_KEY)%'

    App\Service\ContactService:
        arguments:
            $adminEmail: '%env(ADMIN_EMAIL)%'